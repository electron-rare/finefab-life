services:
  traefik:
    image: traefik:3
    container_name: traefik
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - traefik-acme:/acme
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    environment:
      - CF_API_EMAIL=${CLOUDFLARE_AUTH_EMAIL:-}
      - CF_API_KEY=${CLOUDFLARE_API_KEY:-}
    restart: unless-stopped
    networks:
      - traefik

  life-core:
    build: ./life-core
    container_name: life-core
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - BROWSER_RUNNER_URL=http://browser-runner:8010
      - BROWSER_ALLOWED_HOSTS=${BROWSER_ALLOWED_HOSTS:-life.saillant.cc,test.saillant.cc,api.saillant.cc,langfuse.saillant.cc,jaeger.saillant.cc,grafana.saillant.cc,docs.langfuse.com,platform.openai.com,huggingface.co,qdrant.tech}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:11436}
      - VLLM_MODELS=${VLLM_MODELS:-openai/qwen-32b-awq}
      - LOCAL_LLM_URL=${LOCAL_LLM_URL:-http://host.docker.internal:11438}
      - LOCAL_LLM_MODELS=${LOCAL_LLM_MODELS:-openai/qwen-3b-tower}
      - EMBED_URL=${EMBED_URL:-http://host.docker.internal:11437}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOSE_PROVIDER=anthropic
      - GOOSE_MODEL=claude-sonnet-4-20250514
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_API_KEY=${GRAFANA_API_KEY:-}
      - PROMETHEUS_URL=http://otel-collector:8889
      - ACTIVEPIECES_URL=https://auto.saillant.cc
      - ACTIVEPIECES_TOKEN=${ACTIVEPIECES_TOKEN:-}
      - ACTIVEPIECES_PROJECT_ID=${ACTIVEPIECES_PROJECT_ID:-QG09trLP4ICBvpCbyjVRw}
      - ALLOWED_ORIGINS=https://life.saillant.cc,https://test.saillant.cc,https://api.saillant.cc,https://rag.saillant.cc
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=life-core
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=http://langfuse:3000
      - SEARXNG_URL=${SEARXNG_URL:-http://host.docker.internal:8889}
      - GITHUB_TOKEN=${KILL_LIFE_GITHUB_TOKEN:-}
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "15", "http://localhost:8000/health"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 15s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    group_add:
      - "984"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - life-internal

  browser-runner:
    build: ./life-core
    container_name: browser-runner
    command: ["uvicorn", "life_core.browser_runner_api:app", "--host", "0.0.0.0", "--port", "8010"]
    environment:
      - BROWSER_ENGINE=${BROWSER_RUNNER_ENGINE:-http}
      - BROWSER_ENABLE_HTTP_FALLBACK=true
      - BROWSER_ALLOWED_HOSTS=${BROWSER_ALLOWED_HOSTS:-life.saillant.cc,test.saillant.cc,api.saillant.cc,langfuse.saillant.cc,jaeger.saillant.cc,grafana.saillant.cc,docs.langfuse.com,platform.openai.com,huggingface.co,qdrant.tech}
    healthcheck:
      test: ["CMD", "curl", "-f", "--max-time", "15", "http://localhost:8010/health"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - life-internal

  life-reborn:
    build: ./life-reborn
    container_name: life-reborn
    environment:
      - CORE_URL=http://life-core:8000
      - LIFE_REBORN_API_TOKEN=${LIFE_REBORN_API_TOKEN:-}
      - ALLOWED_ORIGINS=https://life.saillant.cc,https://test.saillant.cc,https://rag.saillant.cc
      - PORT=3210
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=life-reborn
      - KEYCLOAK_JWKS_URL=https://auth.saillant.cc/realms/electro_life/protocol/openid-connect/certs
      - KEYCLOAK_ISSUER=https://auth.saillant.cc/realms/electro_life
    depends_on:
      life-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3210/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.http.routers.life-api.rule=Host(`api.saillant.cc`)
      - traefik.http.routers.life-api.entrypoints=websecure
      - traefik.http.routers.life-api.tls.certresolver=letsencrypt
      - traefik.http.services.life-api.loadbalancer.server.port=3210
    restart: unless-stopped
    networks:
      - life-internal
      - traefik

  life-web:
    build:
      context: ./life-web
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.saillant.cc}
    container_name: life-web
    labels:
      - traefik.enable=true
      - traefik.http.routers.life-web.rule=Host(`life.saillant.cc`)
      - traefik.http.routers.life-web.entrypoints=websecure
      - traefik.http.routers.life-web.tls.certresolver=letsencrypt
      - traefik.http.services.life-web.loadbalancer.server.port=80
      # Auth handled client-side via oidc-client-ts, no forward-auth needed
      - traefik.http.routers.life-web-test.rule=Host(`test.saillant.cc`)
      - traefik.http.routers.life-web-test.entrypoints=websecure
      - traefik.http.routers.life-web-test.tls.certresolver=letsencrypt
      - traefik.http.routers.life-web-test.service=life-web
      - traefik.http.routers.life-web-test-http.rule=Host(`test.saillant.cc`)
      - traefik.http.routers.life-web-test-http.entrypoints=web
      - traefik.http.routers.life-web-test-http.service=life-web
    restart: unless-stopped
    networks:
      - traefik

  rag-web:
    build: ./rag-web
    container_name: rag-web
    labels:
      - traefik.enable=true
      - traefik.http.routers.rag-web.rule=Host(`rag.saillant.cc`)
      - traefik.http.routers.rag-web.entrypoints=websecure
      - traefik.http.routers.rag-web.tls.certresolver=letsencrypt
      - traefik.http.services.rag-web.loadbalancer.server.port=80
    networks:
      - traefik
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - life-internal

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    restart: unless-stopped
    networks:
      - life-internal

  forgejo:
    image: gitea/gitea:latest
    container_name: forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__ROOT_URL=https://git.saillant.cc
      - GITEA__server__SSH_DOMAIN=git.saillant.cc
      - GITEA__mirror__ENABLED=true
      - GITEA__mirror__DEFAULT_INTERVAL=1h
    volumes:
      - forgejo-data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.forgejo.rule=Host(`git.saillant.cc`)
      - traefik.http.routers.forgejo.entrypoints=websecure
      - traefik.http.routers.forgejo.tls.certresolver=letsencrypt
      - traefik.http.services.forgejo.loadbalancer.server.port=3000
    restart: unless-stopped
    networks:
      - life-internal
      - traefik

  makelife-cad:
    build: ./makelife-cad
    container_name: makelife-cad
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: makelife-cad
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.cad.rule=Host(`cad.saillant.cc`)
      - traefik.http.routers.cad.entrypoints=websecure
      - traefik.http.routers.cad.tls.certresolver=letsencrypt
      - traefik.http.services.cad.loadbalancer.server.port=8001
    restart: unless-stopped
    networks:
      - life-internal
      - traefik

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/host:ro,rslave
    pid: host
    restart: unless-stopped
    networks:
      - life-internal

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel/config.yaml:/etc/otelcol/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - life-internal

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    labels:
      - traefik.enable=true
      - traefik.http.routers.jaeger.rule=Host(`jaeger.saillant.cc`)
      - traefik.http.routers.jaeger.entrypoints=websecure
      - traefik.http.routers.jaeger.tls.certresolver=letsencrypt
      - traefik.http.services.jaeger.loadbalancer.server.port=16686
      - "traefik.http.routers.jaeger.middlewares=oidc-auth@docker"
    restart: unless-stopped
    networks:
      - life-internal
      - traefik

  langfuse-postgres:
    image: postgres:16-alpine
    container_name: langfuse-postgres
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=${LANGFUSE_POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - life-internal

  langfuse:
    image: langfuse/langfuse:2
    container_name: langfuse
    environment:
      - DATABASE_URL=postgresql://langfuse:${LANGFUSE_POSTGRES_PASSWORD:-changeme}@langfuse-postgres:5432/langfuse
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-changeme}
      - NEXTAUTH_URL=https://langfuse.saillant.cc
      - SALT=${LANGFUSE_SALT:-changeme}
      - TELEMETRY_ENABLED=false
      - HOSTNAME=0.0.0.0
    depends_on:
      langfuse-postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.langfuse.rule=Host(`langfuse.saillant.cc`)
      - traefik.http.routers.langfuse.entrypoints=websecure
      - traefik.http.routers.langfuse.tls.certresolver=letsencrypt
      - traefik.http.services.langfuse.loadbalancer.server.port=3000
      - "traefik.http.routers.langfuse.middlewares=oidc-auth@docker"
    restart: unless-stopped
    networks:
      - life-internal
      - traefik

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_SERVER_HTTP_ADDR=0.0.0.0
      # Auto-provision via traefik-forward-auth: X-Forwarded-User contains
      # the Keycloak email after the middleware validates the session.
      # GF_USERS_ALLOW_SIGN_UP gates AUTO_SIGN_UP; whitelist restricts the
      # auth_proxy header to the Docker bridge so nothing external spoofs it.
      - GF_USERS_ALLOW_SIGN_UP=true
      - GF_AUTH_PROXY_ENABLED=true
      - GF_AUTH_PROXY_HEADER_NAME=X-Forwarded-User
      - GF_AUTH_PROXY_HEADER_PROPERTY=username
      - GF_AUTH_PROXY_HEADERS=Email:X-Forwarded-User Name:X-Forwarded-User
      - GF_AUTH_PROXY_AUTO_SIGN_UP=true
      - GF_AUTH_PROXY_ENABLE_LOGIN_TOKEN=true
      - GF_AUTH_PROXY_WHITELIST=172.0.0.0/8
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`grafana.saillant.cc`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls.certresolver=letsencrypt
      - traefik.http.services.grafana.loadbalancer.server.port=3000
      - "traefik.http.routers.grafana.middlewares=oidc-auth@docker"
    restart: unless-stopped
    networks:
      - life-internal
      - traefik

  # vllm-kxkm-proxy: replaced by systemd SSH tunnel (kxkm-ai-tunnel.service)
  # ollama-cils-proxy: removed (Cils offline, embeddings via Ollama Tower)

  traefik-forward-auth:
    image: thomseddon/traefik-forward-auth:2
    container_name: traefik-forward-auth
    environment:
      PROVIDERS_OIDC_ISSUER_URL: https://auth.saillant.cc/realms/electron_rare
      PROVIDERS_OIDC_CLIENT_ID: oauth2-proxy
      PROVIDERS_OIDC_CLIENT_SECRET: ${ER_OAUTH2_PROXY_CLIENT_SECRET:-changeme}
      DEFAULT_PROVIDER: oidc
      SECRET: ${FORWARD_AUTH_SECRET:-random-secret-change-me}
      AUTH_HOST: auth-gate.saillant.cc
      COOKIE_DOMAIN: saillant.cc
      INSECURE_COOKIE: "true"
      LOG_LEVEL: info
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth-gate.rule=Host(`auth-gate.saillant.cc`)"
      - "traefik.http.routers.auth-gate.entrypoints=websecure"
      - "traefik.http.routers.auth-gate.tls.certresolver=letsencrypt"
      # Self-apply: /_oauth callbacks must traverse the oidc-auth middleware
      # so X-Forwarded-Uri arrives populated. Without this, forward-auth's
      # internal router sees an empty path, misroutes every callback to
      # AuthHandler, and users loop without ever getting _forward_auth set.
      - "traefik.http.routers.auth-gate.middlewares=oidc-auth@docker"
      - "traefik.http.services.auth-gate.loadbalancer.server.port=4181"
      - "traefik.http.middlewares.oidc-auth.forwardauth.address=http://traefik-forward-auth:4181"
      - "traefik.http.middlewares.oidc-auth.forwardauth.authResponseHeaders=X-Forwarded-User"
      - "traefik.http.middlewares.oidc-auth.forwardauth.trustForwardHeader=true"
    restart: unless-stopped

  keycloak-postgres:
    image: postgres:16-alpine
    container_name: keycloak-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak-secret-2026}
    volumes:
      - keycloak-pg-data:/var/lib/postgresql/data
    networks:
      - life-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak-secret-2026}
      KC_HOSTNAME: auth.saillant.cc
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin-secret-2026}
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    networks:
      - life-internal
    restart: unless-stopped

  goosed:
    build:
      context: ./goose
      dockerfile: Dockerfile
    container_name: goosed
    restart: unless-stopped
    ports:
      - "3300:3000"
    environment:
      - GOOSE_PROVIDER=${GOOSE_PROVIDER:-anthropic}
      - GOOSE_MODEL=${GOOSE_MODEL:-claude-sonnet-4-20250514}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOSE_HOST=0.0.0.0
      - GOOSE_PORT=3000
    labels:
      - traefik.enable=true
      - traefik.http.routers.goosed.rule=Host(`goose.saillant.cc`)
      - traefik.http.routers.goosed.entrypoints=websecure
      - traefik.http.routers.goosed.tls.certresolver=letsencrypt
      - traefik.http.services.goosed.loadbalancer.server.port=3000
      - "traefik.http.routers.goosed.middlewares=oidc-auth@docker"
    networks:
      - life-internal
      - traefik
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - life-core

  eda-web:
    build:
      context: ./eda-web
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.saillant.cc}
        VITE_CAD_URL: ${VITE_CAD_URL:-https://api.saillant.cc/eda}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-https://auth.saillant.cc}
        VITE_KEYCLOAK_REALM: electro_life
        VITE_KEYCLOAK_CLIENT_ID: eda-web
    container_name: eda-web
    labels:
      - traefik.enable=true
      - traefik.http.routers.eda-web.rule=Host(`eda.saillant.cc`)
      - traefik.http.routers.eda-web.entrypoints=websecure
      - traefik.http.routers.eda-web.tls.certresolver=letsencrypt
      - traefik.http.services.eda-web.loadbalancer.server.port=80
    restart: unless-stopped
    networks:
      - traefik

networks:
  life-internal:
    driver: bridge
  traefik:
    name: traefik
    driver: bridge

volumes:
  traefik-acme:
  redis-data:
  qdrant-data:
  forgejo-data:
  langfuse-pg-data:
  grafana-data:
  keycloak-pg-data:
