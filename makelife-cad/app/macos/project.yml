name: MakelifeCAD
options:
  bundleIdPrefix: cc.saillant
  deploymentTarget:
    macOS: "14.0"

targets:
  MakelifeCAD:
    type: application
    platform: macOS
    sources:
      - path: MakelifeCAD
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: cc.saillant.makelife-cad
        PRODUCT_NAME: MakelifeCAD
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.10"
        SWIFT_OBJC_BRIDGING_HEADER: MakelifeCAD/Bridge/MakelifeCAD-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(PROJECT_DIR)/../../kicad-bridge/include
        LIBRARY_SEARCH_PATHS:
          - $(PROJECT_DIR)/../../kicad-bridge/build
        OTHER_LDFLAGS:
          - -lkicad_bridge
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  MakelifeCADTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MakelifeCADTests
    dependencies:
      - target: MakelifeCAD
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: cc.saillant.makelife-cad.tests
        SWIFT_VERSION: "5.10"
        HEADER_SEARCH_PATHS:
          - $(PROJECT_DIR)/../../kicad-bridge/include
        LIBRARY_SEARCH_PATHS:
          - $(PROJECT_DIR)/../../kicad-bridge/build
