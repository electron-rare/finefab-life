name: MakeLife Firmware
on:
  push:
    paths: ['firmware/**']
  pull_request:
    paths: ['firmware/**']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install platformio
      - run: cd firmware && pio run
      - run: cd firmware && pio test
