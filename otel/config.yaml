receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus/nodes:
    config:
      scrape_configs:
        - job_name: node-exporter
          scrape_interval: 30s
          static_configs:
            - targets:
                - node-exporter:9100
              labels:
                machine: tower
            - targets:
                - 192.168.0.119:9100
              labels:
                machine: photon
            - targets:
                - host.docker.internal:11440
              labels:
                machine: kxkm-ai
            - targets:
                - 192.168.0.119:9202
              labels:
                machine: cils
        - job_name: nvidia-gpu
          scrape_interval: 30s
          static_configs:
            - targets:
                - host.docker.internal:11441
              labels:
                machine: kxkm-ai

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  debug:
    verbosity: basic
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: finefab
    send_timestamps: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp, prometheus/nodes]
      processors: [batch]
      exporters: [prometheus, debug]
